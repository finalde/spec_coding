metadata:
  task_id: studio_nav
  root_folder: projects
  output_root: projects/spec_studio
  created_at: 2026-04-29T12:30:00Z
  spec_ref: specs/specs/studio_nav/spec.md
  dossier_ref: specs/findings/studio_nav/dossier.md
  adjustments_ref: null
  conventions_ref: CLAUDE.md

globals:
  language: python+typescript
  build_command: "python -m compileall projects/spec_studio/backend && cd projects/spec_studio/frontend && npm run typecheck && npm run build"
  test_command: null

risks:
  - id: R-001
    description: "Mantine + existing Tailwind CSS conflicts (specificity edge cases)."
    mitigation: "Mount MantineProvider at the root; keep Tailwind utilities scoped to layout-only. Validation should grep for double-applied class collisions."
  - id: R-002
    description: "Monaco Vite worker config is the #1 silent-failure mode (loader.config({ monaco }) ordering)."
    mitigation: "Module-scope loader.config call before any <Editor /> mount. Validator runs `npm run build` and inspects for monaco-yaml worker chunk."
  - id: R-003
    description: "qa.md schema parser may break on malformed user-edited markdown."
    mitigation: "Parser raises typed errors; route returns 422 with line numbers; UI falls back to raw markdown editing."
  - id: R-004
    description: "PUT to repo-level files (CLAUDE.md / SKILL.md / agent .md) corrupts the agent runtime if content is invalid."
    mitigation: "Confirm-gating + .bak snapshot. Document the failure mode (last-write-wins, recovery via .bak) in README."
  - id: R-005
    description: "Large Monaco bundle slows initial app load."
    mitigation: "React.lazy on ExecutionPlanModule so Monaco only loads on the Plan route."

work_units:

  # ── Backend foundations ───────────────────────────────────────────────────

  - id: WU-001
    type: code
    description: "AtomicWriter + BackupWriter classes for safe file writes (temp + os.replace + sibling .bak)."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/editable_artifacts.md
      - projects/spec_studio/backend/libs/storage/file_store.py
      - CLAUDE.md
    outputs:
      - projects/spec_studio/backend/libs/storage/safe_writer.py
    depends_on: []
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-safe-writer-exists, AC-typed-py, AC-compileall]

  - id: WU-002
    type: code
    description: "RepoInputResolver — allowlist of editable repo files (CLAUDE.md, .claude/skills/agent_team/SKILL.md, .claude/agents/agent_team__*.md), traversal-safe path resolution."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/editable_artifacts.md
      - CLAUDE.md
    outputs:
      - projects/spec_studio/backend/libs/edits/__init__.py
      - projects/spec_studio/backend/libs/edits/repo_paths.py
    depends_on: []
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-repo-paths-exists, AC-typed-py, AC-compileall]

  - id: WU-003
    type: code
    description: "qa.md parser/renderer — bidirectional between qa.md text and a typed list of {round, perspective, question, options[{key, text, picked, freeform_value}], notes}."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/markdown_editor.md
      - .claude/agents/agent_team__interview_manager.md
      - specs/interviews/studio_nav/qa.md
    outputs:
      - projects/spec_studio/backend/libs/parsers/__init__.py
      - projects/spec_studio/backend/libs/parsers/qa_parser.py
    depends_on: []
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-qa-parser-exists, AC-typed-py, AC-compileall, AC-qa-roundtrip]

  - id: WU-004
    type: code
    description: "Pydantic models — extend ArtifactKind to include initial_prompt and skill_md/claude_md/agent_md; add InputBundle, RepoEditBody, ArtifactEditBody, InterviewQA, InterviewQuestion, InterviewOption, ArtifactSaveResult."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/editable_artifacts.md
      - projects/spec_studio/backend/libs/models/schemas.py
    outputs:
      - projects/spec_studio/backend/libs/models/schemas.py
      - projects/spec_studio/backend/libs/models/__init__.py
    depends_on: []
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-schemas-include-new-models, AC-typed-py, AC-compileall]

  - id: WU-005
    type: code
    description: "Extend FileStore with current_phase_manager_path(task_id) — given a task's current_phase, returns the absolute path of the corresponding agent file under .claude/agents/."
    inputs:
      - specs/specs/studio_nav/spec.md
      - projects/spec_studio/backend/libs/storage/file_store.py
      - .claude/agents
    outputs:
      - projects/spec_studio/backend/libs/storage/file_store.py
    depends_on: [WU-004]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-current-phase-mgr-helper, AC-typed-py, AC-compileall]

  # ── Backend routes ────────────────────────────────────────────────────────

  - id: WU-006
    type: code
    description: "GET /api/tasks/{task_id}/inputs — aggregator returning the four Input sources (claude_md, skill_md, phase_manager_md, initial_prompt) with path/content/editable/sha256."
    inputs:
      - specs/specs/studio_nav/spec.md
      - projects/spec_studio/backend/libs/routes/__init__.py
      - projects/spec_studio/backend/libs/routes/artifacts.py
    outputs:
      - projects/spec_studio/backend/libs/routes/inputs.py
      - projects/spec_studio/backend/libs/routes/__init__.py
    depends_on: [WU-002, WU-004, WU-005]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-inputs-route-registered, AC-typed-py, AC-compileall]

  - id: WU-007
    type: code
    description: "PUT /api/tasks/{task_id}/artifacts/{kind} (kind in qa/spec/plan/initial_prompt) — uses AtomicWriter + BackupWriter, returns ArtifactSaveResult with sha256. Plus PUT /api/inputs/{name} (claude_md/skill_md) and PUT /api/agents/{name}, each requiring confirm:true."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/editable_artifacts.md
      - projects/spec_studio/backend/libs/routes/artifacts.py
    outputs:
      - projects/spec_studio/backend/libs/routes/edits.py
      - projects/spec_studio/backend/libs/routes/__init__.py
    depends_on: [WU-001, WU-002, WU-004]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-edits-routes-registered, AC-typed-py, AC-compileall, AC-confirm-required]

  - id: WU-008
    type: code
    description: "GET /api/tasks/{task_id}/interview returns parsed InterviewQA; PUT /api/tasks/{task_id}/interview takes an InterviewQA and re-renders to qa.md via the parser, then writes via AtomicWriter."
    inputs:
      - specs/specs/studio_nav/spec.md
      - projects/spec_studio/backend/libs/parsers/qa_parser.py
    outputs:
      - projects/spec_studio/backend/libs/routes/interview.py
      - projects/spec_studio/backend/libs/routes/__init__.py
    depends_on: [WU-001, WU-003, WU-004]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-interview-route-registered, AC-typed-py, AC-compileall]

  - id: WU-009
    type: code
    description: "Wire all new routers (inputs, edits, interview) in app.py with /api prefix and tags."
    inputs:
      - projects/spec_studio/backend/libs/app.py
      - projects/spec_studio/backend/libs/routes/__init__.py
    outputs:
      - projects/spec_studio/backend/libs/app.py
    depends_on: [WU-006, WU-007, WU-008]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-app-imports-new-routers, AC-compileall, AC-app-boots]

  # ── Frontend foundations ─────────────────────────────────────────────────

  - id: WU-010
    type: code
    description: "Add Mantine v8 + editor deps to package.json, install, and configure MantineProvider + Notifications + Modals in main.tsx with the Mantine global CSS imports."
    inputs:
      - specs/findings/studio_nav/component_library.md
      - projects/spec_studio/frontend/package.json
      - projects/spec_studio/frontend/src/main.tsx
    outputs:
      - projects/spec_studio/frontend/package.json
      - projects/spec_studio/frontend/src/main.tsx
    depends_on: []
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-mantine-deps, AC-md-editor-dep, AC-monaco-deps, AC-mantine-provider-wired, AC-tsc-build]

  - id: WU-011
    type: code
    description: "Configure Monaco worker for Vite — yaml.worker wrapper module + MonacoEnvironment.getWorker dispatch + loader.config({ monaco }) at module scope."
    inputs:
      - specs/findings/studio_nav/yaml_editor.md
      - projects/spec_studio/frontend/vite.config.ts
      - projects/spec_studio/frontend/src/main.tsx
    outputs:
      - projects/spec_studio/frontend/src/editor/yaml.worker.ts
      - projects/spec_studio/frontend/src/editor/monaco_setup.ts
      - projects/spec_studio/frontend/src/main.tsx
    depends_on: [WU-010]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-monaco-worker-config, AC-tsc-build]

  - id: WU-012
    type: code
    description: "TS types + API client extensions — add InputBundle, InterviewQA, InterviewQuestion, InterviewOption types; api.getInputs / putInput / putAgent / putArtifact / getInterview / putInterview methods."
    inputs:
      - projects/spec_studio/frontend/src/types/index.ts
      - projects/spec_studio/frontend/src/api/client.ts
      - projects/spec_studio/backend/libs/models/schemas.py
    outputs:
      - projects/spec_studio/frontend/src/types/index.ts
      - projects/spec_studio/frontend/src/api/client.ts
    depends_on: [WU-004, WU-010]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-api-methods-present, AC-tsc-build]

  - id: WU-013
    type: asset
    description: "JSON Schema for plan.yaml derived from agent_team__execution_plan_compiler.md § Output. Used by monaco-yaml for validation."
    inputs:
      - .claude/agents/agent_team__execution_plan_compiler.md
      - specs/execution_plans/studio_nav/plan.yaml
    outputs:
      - projects/spec_studio/frontend/src/schemas/plan.schema.json
    depends_on: []
    tools_allowed: [Read, Write]
    acceptance_checks: [AC-plan-schema-valid-json]

  # ── Frontend modules ─────────────────────────────────────────────────────

  - id: WU-014
    type: code
    description: "Replace TaskDetail.tsx with a Mantine AppShell + vertical NavLink list of five modules (Input, Interview Questions, Specs, Findings, Execution Plan); add module routing in App.tsx using /tasks/:taskId/:module with redirect default to /tasks/:taskId/input."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/component_library.md
      - projects/spec_studio/frontend/src/App.tsx
      - projects/spec_studio/frontend/src/pages/TaskDetail.tsx
    outputs:
      - projects/spec_studio/frontend/src/App.tsx
      - projects/spec_studio/frontend/src/pages/TaskDetail.tsx
      - projects/spec_studio/frontend/src/components/modules/__placeholder.ts
    depends_on: [WU-010]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-task-detail-five-modules, AC-routing-deep-link, AC-tsc-build]

  - id: WU-015
    type: code
    description: "InputModule.tsx — Mantine Tabs with four sub-tabs (CLAUDE.md, SKILL.md, current phase manager .md, initial_prompt.md). Each sub-tab uses @uiw/react-md-editor with edit/preview toggle and a Save button. Confirm dialog (Mantine Modal) before PUTs to repo-level files."
    inputs:
      - specs/specs/studio_nav/spec.md
      - projects/spec_studio/frontend/src/api/client.ts
    outputs:
      - projects/spec_studio/frontend/src/components/modules/InputModule.tsx
    depends_on: [WU-010, WU-012, WU-014]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-input-module-four-subtabs, AC-input-confirm-dialog, AC-tsc-build]

  - id: WU-016
    type: code
    description: "InterviewModule.tsx + InterviewQuestionCard.tsx — fetches typed InterviewQA via GET /api/tasks/{id}/interview; renders one card per question with Mantine Chips for option picking and a notes Textarea (or @uiw/react-md-editor for long notes). Saves via PUT /api/tasks/{id}/interview."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/markdown_editor.md
      - projects/spec_studio/frontend/src/api/client.ts
    outputs:
      - projects/spec_studio/frontend/src/components/modules/InterviewModule.tsx
      - projects/spec_studio/frontend/src/components/modules/InterviewQuestionCard.tsx
    depends_on: [WU-010, WU-012, WU-014]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-interview-card-component, AC-tsc-build]

  - id: WU-017
    type: code
    description: "SpecsModule.tsx — fetch artifact 'spec', render with @uiw/react-md-editor. View/edit toggle. Save via PUT /api/tasks/{id}/artifacts/spec. Optional: 'Run spec compile' button (calls existing POST /spec/start). FindingsModule.tsx — read-only viewer of dossier (top) + per-angle accordion. ExecutionPlanModule.tsx — lazy-loaded Monaco editor with monaco-yaml + plan.schema.json. Save via PUT /api/tasks/{id}/artifacts/plan."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/yaml_editor.md
      - projects/spec_studio/frontend/src/schemas/plan.schema.json
      - projects/spec_studio/frontend/src/api/client.ts
    outputs:
      - projects/spec_studio/frontend/src/components/modules/SpecsModule.tsx
      - projects/spec_studio/frontend/src/components/modules/FindingsModule.tsx
      - projects/spec_studio/frontend/src/components/modules/ExecutionPlanModule.tsx
    depends_on: [WU-010, WU-011, WU-012, WU-013, WU-014]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-three-modules-rendered, AC-monaco-lazy-loaded, AC-tsc-build]

  - id: WU-018
    type: code
    description: "Delete obsolete components — components/phases/Adjustments.tsx, ExecuteValidate.tsx, Plan.tsx, Research.tsx, Spec.tsx, Interview.tsx, ArtifactView.tsx, PhaseRunner.tsx — and remove their imports from anywhere remaining."
    inputs:
      - projects/spec_studio/frontend/src/components/phases
      - projects/spec_studio/frontend/src/pages/TaskDetail.tsx
    outputs:
      - projects/spec_studio/frontend/src/components/phases/.gone
    depends_on: [WU-014, WU-015, WU-016, WU-017]
    tools_allowed: [Read, Edit, Write, Bash]
    acceptance_checks: [AC-old-phase-components-gone, AC-no-stale-imports, AC-tsc-build]

  # ── Docs + final acceptance ──────────────────────────────────────────────

  - id: WU-019
    type: writer
    description: "Update projects/spec_studio/README.md — document new module set, Mantine v8 + editor library choices, new endpoints, .bak conflict semantics, and how to override the run-control default. Update root README.md if any of its claims about the UI are now stale."
    inputs:
      - specs/specs/studio_nav/spec.md
      - specs/findings/studio_nav/dossier.md
      - projects/spec_studio/README.md
      - README.md
    outputs:
      - projects/spec_studio/README.md
      - README.md
    depends_on: [WU-009, WU-014, WU-015, WU-016, WU-017]
    tools_allowed: [Read, Edit, Write]
    acceptance_checks: [AC-readme-mentions-modules, AC-readme-mentions-mantine, AC-readme-mentions-bak]

  - id: WU-020
    type: code
    description: "End-to-end build verification — run python -m compileall projects/spec_studio/backend, npm --prefix projects/spec_studio/frontend run typecheck, npm --prefix projects/spec_studio/frontend run build."
    inputs:
      - projects/spec_studio/backend
      - projects/spec_studio/frontend
    outputs: []
    depends_on: [WU-009, WU-018, WU-019]
    tools_allowed: [Read, Bash]
    acceptance_checks: [AC-compileall, AC-tsc-build, AC-vite-build]

# ── Acceptance checks ──────────────────────────────────────────────────────

acceptance_checks:

  # File existence
  - id: AC-safe-writer-exists
    kind: file_exists
    spec: { path: "projects/spec_studio/backend/libs/storage/safe_writer.py" }

  - id: AC-repo-paths-exists
    kind: file_exists
    spec: { path: "projects/spec_studio/backend/libs/edits/repo_paths.py" }

  - id: AC-qa-parser-exists
    kind: file_exists
    spec: { path: "projects/spec_studio/backend/libs/parsers/qa_parser.py" }

  - id: AC-plan-schema-valid-json
    kind: cmd
    spec:
      cmd: "python -c \"import json,sys; json.load(open('projects/spec_studio/frontend/src/schemas/plan.schema.json'))\""
      expect_exit: 0

  # Grep / structural
  - id: AC-mantine-deps
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/package.json"
      pattern: '"@mantine/core"'
      expect: match

  - id: AC-md-editor-dep
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/package.json"
      pattern: '"@uiw/react-md-editor"'
      expect: match

  - id: AC-monaco-deps
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/package.json"
      pattern: '"monaco-yaml"'
      expect: match

  - id: AC-mantine-provider-wired
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/src/main.tsx"
      pattern: 'MantineProvider'
      expect: match

  - id: AC-monaco-worker-config
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/src/editor/monaco_setup.ts"
      pattern: 'MonacoEnvironment'
      expect: match

  - id: AC-task-detail-five-modules
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/src/pages/TaskDetail.tsx"
      pattern: 'Execution Plan'
      expect: match

  - id: AC-routing-deep-link
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/src/App.tsx"
      pattern: ':module'
      expect: match

  - id: AC-input-module-four-subtabs
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/src/components/modules/InputModule.tsx"
      pattern: 'initial_prompt'
      expect: match

  - id: AC-input-confirm-dialog
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/src/components/modules/InputModule.tsx"
      pattern: 'confirm'
      expect: match

  - id: AC-interview-card-component
    kind: file_exists
    spec: { path: "projects/spec_studio/frontend/src/components/modules/InterviewQuestionCard.tsx" }

  - id: AC-three-modules-rendered
    kind: file_exists
    spec: { path: "projects/spec_studio/frontend/src/components/modules/ExecutionPlanModule.tsx" }

  - id: AC-monaco-lazy-loaded
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/src/pages/TaskDetail.tsx"
      pattern: 'lazy'
      expect: match

  - id: AC-old-phase-components-gone
    kind: file_exists
    spec: { path: "projects/spec_studio/frontend/src/components/phases/Adjustments.tsx" }
    expect: missing

  - id: AC-no-stale-imports
    kind: grep
    spec:
      path: "projects/spec_studio/frontend/src/pages/TaskDetail.tsx"
      pattern: "components/phases"
      expect: no_match

  - id: AC-app-imports-new-routers
    kind: grep
    spec:
      path: "projects/spec_studio/backend/libs/app.py"
      pattern: 'edits_router|inputs_router|interview_router'
      expect: match

  - id: AC-current-phase-mgr-helper
    kind: grep
    spec:
      path: "projects/spec_studio/backend/libs/storage/file_store.py"
      pattern: 'current_phase_manager_path'
      expect: match

  - id: AC-schemas-include-new-models
    kind: grep
    spec:
      path: "projects/spec_studio/backend/libs/models/schemas.py"
      pattern: 'InputBundle|RepoEditBody|ArtifactEditBody|InterviewQA'
      expect: match

  - id: AC-inputs-route-registered
    kind: grep
    spec:
      path: "projects/spec_studio/backend/libs/routes/inputs.py"
      pattern: '/tasks/.*/inputs'
      expect: match

  - id: AC-edits-routes-registered
    kind: grep
    spec:
      path: "projects/spec_studio/backend/libs/routes/edits.py"
      pattern: 'PUT|put|@router.put'
      expect: match

  - id: AC-confirm-required
    kind: grep
    spec:
      path: "projects/spec_studio/backend/libs/routes/edits.py"
      pattern: 'confirm'
      expect: match

  - id: AC-interview-route-registered
    kind: grep
    spec:
      path: "projects/spec_studio/backend/libs/routes/interview.py"
      pattern: 'qa_parser|InterviewQA'
      expect: match

  - id: AC-readme-mentions-modules
    kind: grep
    spec:
      path: "projects/spec_studio/README.md"
      pattern: 'Execution Plan'
      expect: match

  - id: AC-readme-mentions-mantine
    kind: grep
    spec:
      path: "projects/spec_studio/README.md"
      pattern: 'Mantine'
      expect: match

  - id: AC-readme-mentions-bak
    kind: grep
    spec:
      path: "projects/spec_studio/README.md"
      pattern: '\.bak|last-write-wins'
      expect: match

  # Round-trip
  - id: AC-qa-roundtrip
    kind: cmd
    spec:
      cmd: ".venv/Scripts/python.exe -c \"import sys; sys.path.insert(0,'projects/spec_studio'); from backend.libs.parsers.qa_parser import parse_qa, render_qa; from pathlib import Path; src=Path('specs/interviews/studio_nav/qa.md').read_text(encoding='utf-8'); parsed=parse_qa(src); rendered=render_qa(parsed); reparsed=parse_qa(rendered); assert parsed==reparsed, 'round-trip mismatch'\""
      expect_exit: 0

  # Build / type checks
  - id: AC-compileall
    kind: cmd
    spec:
      cmd: ".venv/Scripts/python.exe -m compileall projects/spec_studio/backend"
      expect_exit: 0

  - id: AC-tsc-build
    kind: cmd
    spec:
      cmd: "npm --prefix projects/spec_studio/frontend run typecheck"
      expect_exit: 0

  - id: AC-vite-build
    kind: cmd
    spec:
      cmd: "npm --prefix projects/spec_studio/frontend run build"
      expect_exit: 0

  - id: AC-app-boots
    kind: cmd
    spec:
      cmd: ".venv/Scripts/python.exe -c \"import sys; sys.path.insert(0,'projects/spec_studio'); from backend.libs.app import create_app; app=create_app(); assert any('/api/tasks/{task_id}/inputs' in getattr(r,'path','') for r in app.routes), 'inputs route missing'\""
      expect_exit: 0

  # Quality (LLM review)
  - id: AC-typed-py
    kind: llm_review
    spec:
      target: "projects/spec_studio/backend/libs/{storage/safe_writer,edits/repo_paths,parsers/qa_parser,routes/inputs,routes/edits,routes/interview}.py"
      criteria:
        - "Every function and method has type hints on all parameters and the return value."
        - "Stateful concepts are modeled as classes (not free-standing functions); @dataclass(frozen=True) for value objects."
        - "Uses str | None union syntax (not Optional[str])."
        - "No comments unless the WHY is non-obvious."

revision_policy:
  max_iterations: 3
  on_block: escalate

open_questions: []
